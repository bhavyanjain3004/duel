name: Pathfinder Duel CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
    - uses: actions/checkout@v3
    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
    - name: Build with Maven
      run: ./apache-maven-3.9.6/bin/mvn clean package -DskipTests --no-transfer-progress
    - name: Run Tests
      run: ./apache-maven-3.9.6/bin/mvn test --no-transfer-progress
      
  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
    - uses: actions/checkout@v3
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    - name: Install dependencies
      run: npm ci
    - name: Build frontend
      run: npm run build
      env:
        VITE_BACKEND_URL: https://placeholder.up.railway.app
        VITE_WS_URL: wss://placeholder.up.railway.app
