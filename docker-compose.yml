version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: duel_postgres
    environment:
      POSTGRES_DB: duel_db
      POSTGRES_USER: duel_user
      POSTGRES_PASSWORD: duel_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: duel_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data:
