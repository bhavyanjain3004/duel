spring:
  application:
    name: pathfinder-duel

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/duel_db}
    username: ${PGUSER:duel_user}
    password: ${PGPASSWORD:duel_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

server:
  port: ${PORT:8080}
