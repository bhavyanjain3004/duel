spring:
  application:
    name: pathfinder-duel

  datasource:
    url: jdbc:postgresql://localhost:5432/duel_db
    username: duel_user
    password: duel_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080
